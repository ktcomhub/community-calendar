<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社區客廳 3-4月活動總匯</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f0f4f8; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid #e2e8f0; border-left: 1px solid #e2e8f0; }
        .day-cell { min-height: 110px; border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; background: white; transition: 0.2s; }
        .day-cell:hover { background: #f8fafc; }
        .event-bar { font-size: 11px; padding: 2px 4px; border-radius: 3px; margin-bottom: 2px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        @media (max-width: 640px) {
            .day-cell { min-height: 70px; }
            .event-bar { font-size: 10px; padding: 1px 2px; }
        }
        .active-tab { border-bottom: 4px solid #f97316; color: #f97316; font-weight: bold; }
    </style>
</head>
<body class="pb-10">

    <!-- Header Section -->
    <div class="bg-orange-600 text-white p-6 shadow-lg">
        <div class="max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold">🏠 社區客廳活動報名站</h1>
                <p class="mt-1 opacity-90 text-sm">3月 - 4月 | 中大合作及本中心活動一覽</p>
            </div>
            <div class="flex gap-2">
                <button onclick="changeMonth(2)" id="btnMar" class="px-6 py-2 rounded-full bg-white/20 hover:bg-white/30 transition">3月</button>
                <button onclick="changeMonth(3)" id="btnApr" class="px-6 py-2 rounded-full bg-white/20 hover:bg-white/30 transition">4月</button>
            </div>
        </div>
    </div>

    <!-- Quick Filter -->
    <div class="max-w-5xl mx-auto mt-4 px-4 flex flex-wrap gap-2 text-sm text-gray-600">
        <span class="font-bold mr-2">分類指引：</span>
        <span class="flex items-center gap-1"><span class="w-3 h-3 bg-blue-500 rounded-full"></span> 中大合作 (11個)</span>
        <span class="flex items-center gap-1 ml-4"><span class="w-3 h-3 bg-orange-500 rounded-full"></span> 客廳自辦 (10+個)</span>
    </div>

    <!-- Calendar Container -->
    <div class="max-w-5xl mx-auto mt-4 px-2 md:px-0">
        <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-200">
            <div class="grid grid-cols-7 text-center font-bold bg-gray-50 text-gray-500 border-b">
                <div class="py-3 text-red-500">日</div>
                <div class="py-3">一</div>
                <div class="py-3">二</div>
                <div class="py-3">三</div>
                <div class="py-3">四</div>
                <div class="py-3">五</div>
                <div class="py-3 text-blue-400">六</div>
            </div>
            <div id="calendarContent" class="calendar-grid">
                <!-- Days auto-generated -->
            </div>
        </div>
    </div>

    <!-- Instructions for Residents -->
    <div class="max-w-5xl mx-auto mt-6 px-4">
        <div class="bg-blue-50 border-l-4 border-blue-400 p-4 rounded-r-lg">
            <h4 class="font-bold text-blue-800">💡 給街坊的小貼士</h4>
            <ul class="text-sm text-blue-700 list-disc list-inside mt-1">
                <li>點擊月曆上的活動名稱，即可查看詳細時間、地點及簡介。</li>
                <li>點擊「立即報名」按鈕，會自動轉跳到 Google Form 或 WhatsApp 登記。</li>
                <li>您可以將此網址「加入主螢幕」，隨時查看最新活動。</li>
            </ul>
        </div>
    </div>

    <!-- Modal -->
    <div id="eventModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl w-full max-w-md overflow-hidden shadow-2xl transition-all">
            <div id="modalHeader" class="p-6 text-white bg-slate-800 relative">
                <button onclick="closeModal()" class="absolute top-4 right-4 text-white/70 hover:text-white text-3xl">&times;</button>
                <span id="modalCategory" class="text-[10px] uppercase tracking-widest px-2 py-1 bg-white/20 rounded-md">分類</span>
                <h3 id="modalTitle" class="text-2xl font-bold mt-2">活動名稱</h3>
            </div>
            <div class="p-6 space-y-4 text-gray-700">
                <div class="flex items-start gap-3">
                    <span class="text-xl">📅</span>
                    <div>
                        <p class="text-xs text-gray-400">活動日期</p>
                        <p id="modalDate" class="font-medium"></p>
                    </div>
                </div>
                <div class="flex items-start gap-3">
                    <span class="text-xl">⏰</span>
                    <div>
                        <p class="text-xs text-gray-400">活動時間</p>
                        <p id="modalTime" class="font-medium"></p>
                    </div>
                </div>
                <div class="flex items-start gap-3">
                    <span class="text-xl">📝</span>
                    <div>
                        <p class="text-xs text-gray-400">詳情介紹</p>
                        <p id="modalDesc" class="text-sm leading-relaxed"></p>
                    </div>
                </div>
                <div class="pt-4 flex gap-3">
                    <button onclick="closeModal()" class="flex-1 py-3 border border-gray-200 rounded-xl font-medium hover:bg-gray-50">返回</button>
                    <a id="modalLink" href="#" target="_blank" class="flex-1 py-3 bg-orange-600 text-white text-center rounded-xl font-bold hover:bg-orange-700 transition shadow-lg">按此報名</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 核心數據：在此加入 11 個中大活動 + 10 個客廳活動
        const activities = [
            // --- 中大合作活動 ---
            { date: '2026-03-18', title: '造盒，儲物', time: '10 - 11:30 AM', desc: '中大學生合作：分享家居收納貼士，教授將環保紙袋轉化為實用收納盒。', cat: 'CUHK', link: 'https://wa.me/85297208622' },
            { date: '2026-03-19', title: '健康生活工作坊', time: '9 - 11:00 AM', desc: '中大醫科生分享：運動過後如何進行營養補充，改善肌肉痠痛。', cat: 'CUHK', link: 'https://wa.me/85297208622' },
            { date: '2026-03-19', title: '功樂學習攤位', time: '4 - 6:00 PM', desc: '中大哥哥姐姐與中學生教小朋友趣味數學及英語！', cat: 'CUHK', link: 'https://forms.google.com' },
            { date: '2026-04-02', title: '中大藝術體驗', time: '2 - 4:00 PM', desc: '與中大學生一起創作社區壁畫草圖。', cat: 'CUHK', link: 'https://forms.google.com' },
            
            // --- 客廳自辦活動 ---
            { date: '2026-03-21', title: '週六街坊大聚餐', time: '6 - 8:00 PM', desc: '客廳自辦：一人一餸分享會，聯絡鄰里感情。', cat: 'LIVING', link: 'https://forms.google.com' },
            { date: '2026-03-25', title: '法律諮詢服務', time: '7 - 9:00 PM', desc: '客廳自辦：義務律師駐場，解答街坊法律難題。', cat: 'LIVING', link: 'https://forms.google.com' },
            { date: '2026-04-05', title: '清明節傳統糕點', time: '10 - 12:00 PM', desc: '大家一起製作清明仔及茶粿。', cat: 'LIVING', link: 'https://forms.google.com' }
        ];

        let currentMonth = 2; // 0=Jan, 2=Mar

        function renderCalendar(monthIndex) {
            currentMonth = monthIndex;
            const year = 2026;
            const container = document.getElementById('calendarContent');
            container.innerHTML = '';
            
            // Update Buttons
            document.getElementById('btnMar').className = monthIndex === 2 ? 'px-6 py-2 rounded-full bg-white text-orange-600 font-bold shadow-md' : 'px-6 py-2 rounded-full bg-white/20 hover:bg-white/30 transition text-white';
            document.getElementById('btnApr').className = monthIndex === 3 ? 'px-6 py-2 rounded-full bg-white text-orange-600 font-bold shadow-md' : 'px-6 py-2 rounded-full bg-white/20 hover:bg-white/30 transition text-white';

            const firstDay = new Date(year, monthIndex, 1).getDay();
            const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();

            // Padding
            for(let i=0; i<firstDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'day-cell bg-gray-50';
                container.appendChild(empty);
            }

            // Fill days
            for(let d=1; d<=daysInMonth; d++) {
                const dateStr = `${year}-${String(monthIndex + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const cell = document.createElement('div');
                cell.className = 'day-cell p-1 flex flex-col';
                cell.innerHTML = `<span class="text-xs font-bold text-gray-400 ml-1">${d}</span>`;

                const dayEvents = activities.filter(a => a.date === dateStr);
                dayEvents.forEach(evt => {
                    const bar = document.createElement('div');
                    const colorClass = evt.cat === 'CUHK' ? 'bg-blue-500 text-white' : 'bg-orange-500 text-white';
                    bar.className = `event-bar ${colorClass} shadow-sm`;
                    bar.innerText = evt.title;
                    bar.onclick = (e) => { e.stopPropagation(); openModal(evt); };
                    cell.appendChild(bar);
                });
                container.appendChild(cell);
            }
        }

        function changeMonth(m) {
            renderCalendar(m);
        }

        function openModal(evt) {
            document.getElementById('modalTitle').innerText = evt.title;
            document.getElementById('modalDate').innerText = evt.date;
            document.getElementById('modalTime').innerText = evt.time;
            document.getElementById('modalDesc').innerText = evt.desc;
            document.getElementById('modalLink').href = evt.link;
            
            const cat = document.getElementById('modalCategory');
            const header = document.getElementById('modalHeader');
            if(evt.cat === 'CUHK') {
                cat.innerText = '中大合作活動';
                header.className = 'p-6 text-white bg-blue-600 relative';
            } else {
                cat.innerText = '客廳自辦活動';
                header.className = 'p-6 text-white bg-orange-600 relative';
            }

            document.getElementById('eventModal').classList.replace('hidden', 'flex');
        }

        function closeModal() {
            document.getElementById('eventModal').classList.replace('flex', 'hidden');
        }

        window.onclick = function(e) {
            if(e.target === document.getElementById('eventModal')) closeModal();
        }

        window.onload = () => renderCalendar(2);
    </script>
</body>
</html>
