<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>賽馬會「聚首壹塘」社區客廳活動月曆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #ffffff;
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
        }
        .color-primary { color: #2d4a53; }
        .bg-primary { background-color: #2d4a53; }
        
        /* 活動類別顏色 */
        .bg-at-center { background-color: #2d4a53; color: white; border: 1px solid #1a2d33; }
        .bg-outside { background-color: #e67e22; color: white; border: 1px solid #d35400; }
        .bg-family { background-color: #d63031; color: white; border: 1px solid #b22222; }
        .bg-regular { background-color: #79c3ba; color: white; border: 1px solid #5da59c; } /* 恆常活動用綠色 */

        .calendar-grid { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            gap: 2px;
            background-color: #cbd5e1;
            border: 2px solid #cbd5e1;
        }
        .day-cell { 
            min-height: 140px; 
            background: white; 
            padding: 6px;
            display: flex;
            flex-direction: column;
        }
        
        @media (max-width: 640px) {
            .day-cell { min-height: 130px; padding: 4px; }
            .event-label { font-size: 14px !important; padding: 10px 4px !important; }
            .day-number { font-size: 18px !important; }
        }

        .day-number {
            font-size: 20px;
            font-weight: 900;
            color: #94a3b8;
            margin-bottom: 4px;
        }

        .event-label {
            margin-top: 4px;
            padding: 8px 6px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 15px;
            text-align: center;
            box-shadow: 0 3px 6px rgba(0,0,0,0.15);
            cursor: pointer;
            line-height: 1.3;
            transition: transform 0.1s;
        }
        .event-label:active { transform: scale(0.92); }

        .btn-action {
            box-shadow: 0 6px 0 rgba(0,0,0,0.2);
            transition: all 0.1s;
        }
        .btn-action:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.2);
        }
        
        .animate-slide-up {
            animation: slideUp 0.3s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
    </style>
</head>
<body class="pb-24">

    <!-- Header 頂部 -->
    <div class="bg-primary text-white p-8 shadow-xl mb-6 text-center">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-3xl md:text-4xl font-black tracking-tight mb-2">賽馬會「聚首壹塘」社區客廳</h1>
            <div class="inline-block px-6 py-2 bg-white/20 rounded-full text-lg font-bold">3月及4月活動月曆</div>
        </div>
    </div>

    <!-- 月份切換 -->
    <div class="max-w-4xl mx-auto px-4 mb-4 flex justify-between items-center gap-4">
        <button onclick="changeMonth(2)" id="btnMar" class="flex-1 py-5 text-2xl font-black rounded-3xl border-4 border-primary">3月</button>
        <button onclick="changeMonth(3)" id="btnApr" class="flex-1 py-5 text-2xl font-black rounded-3xl border-4 border-primary">4月</button>
    </div>

    <!-- 圖例說明 -->
    <div class="max-w-4xl mx-auto px-4 mb-6 flex flex-wrap justify-center gap-4 text-lg font-black">
        <div class="flex items-center gap-2"><span class="w-6 h-6 rounded bg-at-center"></span> 客廳</div>
        <div class="flex items-center gap-2"><span class="w-6 h-6 rounded bg-outside"></span> 外出</div>
        <div class="flex items-center gap-2"><span class="w-6 h-6 rounded bg-family"></span> 親子</div>
        <div class="flex items-center gap-2"><span class="w-6 h-6 rounded bg-regular"></span> 恆常</div>
    </div>

    <!-- 月曆主體 -->
    <div class="max-w-4xl mx-auto px-2">
        <div class="calendar-grid rounded-t-3xl overflow-hidden mb-1">
            <div class="bg-slate-200 py-4 text-center text-red-600 font-black text-xl">日</div>
            <div class="bg-slate-200 py-4 text-center font-black text-xl text-slate-700">一</div>
            <div class="bg-slate-200 py-4 text-center font-black text-xl text-slate-700">二</div>
            <div class="bg-slate-200 py-4 text-center font-black text-xl text-slate-700">三</div>
            <div class="bg-slate-200 py-4 text-center font-black text-xl text-slate-700">四</div>
            <div class="bg-slate-200 py-4 text-center font-black text-xl text-slate-700">五</div>
            <div class="bg-slate-200 py-4 text-center text-blue-600 font-black text-xl">六</div>
        </div>
        <div id="calendarDays" class="calendar-grid rounded-b-3xl overflow-hidden shadow-2xl"></div>
    </div>

    <!-- 活動詳情彈窗 -->
    <div id="eventModal" class="fixed inset-0 bg-black/80 hidden items-end md:items-center justify-center z-50 p-0 md:p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-xl rounded-t-[40px] md:rounded-[40px] overflow-hidden shadow-2xl animate-slide-up">
            <div id="modalHeaderColor" class="h-8 w-full"></div>
            
            <div class="p-8 md:p-10">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <span id="modalCategoryLabel" class="text-sm font-black px-3 py-1 rounded-lg bg-slate-100 text-slate-500"></span>
                        <h2 id="modalTitle" class="text-3xl md:text-4xl font-black mt-3 color-primary leading-tight"></h2>
                    </div>
                    <button onclick="closeModal()" class="bg-slate-100 w-14 h-14 rounded-full flex items-center justify-center text-4xl text-slate-400 active:bg-slate-200">&times;</button>
                </div>

                <div class="space-y-5">
                    <div class="flex items-center gap-6">
                        <span class="w-14 h-14 flex-shrink-0 flex items-center justify-center bg-orange-100 rounded-2xl text-3xl">📅</span>
                        <div><p class="text-sm text-slate-400 font-black">日期</p><p id="modalDate" class="text-2xl font-black text-slate-800"></p></div>
                    </div>
                    <div class="flex items-center gap-6">
                        <span class="w-14 h-14 flex-shrink-0 flex items-center justify-center bg-blue-100 rounded-2xl text-3xl">⏰</span>
                        <div><p class="text-sm text-slate-400 font-black">時間</p><p id="modalTime" class="text-2xl font-black text-slate-800"></p></div>
                    </div>
                    <div class="flex items-center gap-6">
                        <span class="w-14 h-14 flex-shrink-0 flex items-center justify-center bg-teal-100 rounded-2xl text-3xl">📍</span>
                        <div><p class="text-sm text-slate-400 font-black">地點</p><p id="modalLoc" class="text-2xl font-black text-slate-800"></p></div>
                    </div>
                    <div class="flex items-start gap-6">
                        <span class="w-14 h-14 flex-shrink-0 flex items-center justify-center bg-purple-100 rounded-2xl text-3xl">👤</span>
                        <div><p class="text-sm text-slate-400 font-black">對象</p><p id="modalTarget" class="text-xl font-black text-slate-800"></p></div>
                    </div>
                    <div class="bg-slate-100 p-6 rounded-3xl border-2 border-slate-200">
                        <p id="modalDesc" class="text-slate-700 text-xl font-medium leading-relaxed"></p>
                    </div>
                </div>

                <div class="mt-8 mb-4">
                    <a id="modalLink" href="#" target="_blank" class="btn-action block w-full py-6 text-white text-center text-3xl font-black rounded-[30px] transition-all active:scale-95">
                        按此報名
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const REG_LINK = "https://forms.gle/3XQCVsQdPNvvZDW79";

        // 活動資料
        const activities = [
            // 3月
            { date: '2026-03-19', title: '遊戲攤位', time: '4:30 - 6:00 PM', loc: '客廳', target: '所有街坊', desc: '在遊戲中學習歷史物理知識，完成後有小禮物喔！', type: 'at-center', reg: 'none' },
            { date: '2026-03-25', title: '選科分享', time: '4:00 - 6:30 PM', loc: '客廳', target: '高小-初中生', desc: '中大學生分享選科心得！', type: 'at-center', reg: 'form' },
            { date: '2026-03-27', title: '月會', time: '8:00 - 9:30 PM', loc: '客廳', target: '所有會員', desc: '介紹下月活動，一齊討論客廳運作。小朋友可以睇卡通！', type: 'at-center', reg: 'whatsapp' },
            { date: '2026-03-27', title: '一齊煲湯', time: '3:15 - 5:30 PM', loc: '客廳', target: '所有街坊', desc: '分享時令靚湯同麻糬！', type: 'at-center', reg: 'form' },
            { date: '2026-03-28', title: '中大一日遊', time: '10:15 AM - 3:45 PM', loc: '中大校園', target: '小四至初中生及其家庭', desc: '參觀大學校園環境。', type: 'outside', reg: 'form' },
            
            // 4月
            { date: '2026-04-01', title: '貓Cafe！', time: '3:00 - 5:30 PM', loc: '觀塘', target: '所有街坊', desc: '放鬆心情，同貓貓玩。', type: 'outside', reg: 'form' },
            { date: '2026-04-01', title: '學習支援', time: '4:00 - 7:00 PM', loc: '客廳', target: '高小-高中生', desc: '功課遇難題？姐姐哥哥幫你！', type: 'at-center', reg: 'form' },
            { date: '2026-04-01', title: '行沈雲山', time: '3:15 - 5:15 PM', loc: '沈雲山', target: '所有街坊', desc: '欣賞觀塘美景。', type: 'outside', reg: 'form' },
            { date: '2026-04-08', title: '行山食糖水', time: '2:30 - 6:30 PM', loc: '顯徑', target: '所有街坊', desc: '遠足運動兼食糖水。', type: 'outside', reg: 'form' },
            { date: '2026-04-08', title: '親子一齊玩(1)', time: '5:00 - 7:00 PM', loc: '客廳', target: '親子/祖孫', desc: '建立親密關係。', type: 'family', reg: 'form' },
            { date: '2026-04-09', title: '親子一齊玩(2)', time: '5:00 - 7:00 PM', loc: '客廳', target: '親子/祖孫', desc: '建立親密關係。', type: 'family', reg: 'form' },
            { date: '2026-04-10', title: '親子一齊玩(3)', time: '5:00 - 7:00 PM', loc: '客廳', target: '親子/祖孫', desc: '建立親密關係。', type: 'family', reg: 'form' },
            { date: '2026-04-11', title: 'M+西九野餐', time: '3:30 - 7:00 PM', loc: 'M+文化區', target: '所有街坊', desc: '海邊草地大野餐。', type: 'outside', reg: 'form' },
            { date: '2026-04-14', title: '飲湯啦喂😜', time: '4:30 PM 後', loc: '客廳', target: '所有會員', desc: '「湯開心霏」煲滲組為大家煲時令靚湯✨', type: 'regular', reg: 'none' },
            { date: '2026-04-28', title: '飲湯啦喂😜', time: '4:30 PM 後', loc: '客廳', target: '所有會員', desc: '「湯開心霏」煲滲組為大家煲時令靚湯✨', type: 'regular', reg: 'none' }
        ];

        // 新增星期四影院
        for(let m=2; m<=3; m++) { // 3月和4月
            for(let d=1; d<=31; d++) {
                const date = new Date(2026, m, d);
                if(date.getMonth() === m && date.getDay() === 4) {
                    activities.push({
                        date: `2026-0${m+1}-${String(d).padStart(2,'0')}`,
                        title: '星期四影院',
                        time: '晚上',
                        loc: '客廳',
                        target: '所有會員',
                        desc: '大家一齊坐低睇電影！',
                        type: 'regular',
                        reg: 'none'
                    });
                }
            }
        }

        let currentMonth = 2;

        function renderCalendar(monthIdx) {
            currentMonth = monthIdx;
            const container = document.getElementById('calendarDays');
            container.innerHTML = '';

            const btnMar = document.getElementById('btnMar');
            const btnApr = document.getElementById('btnApr');
            btnMar.className = `flex-1 py-5 text-2xl font-black rounded-3xl border-4 border-primary ${monthIdx===2?'bg-primary text-white shadow-xl':'bg-white text-primary'}`;
            btnApr.className = `flex-1 py-5 text-2xl font-black rounded-3xl border-4 border-primary ${monthIdx===3?'bg-primary text-white shadow-xl':'bg-white text-primary'}`;

            const firstDay = new Date(2026, monthIdx, 1).getDay();
            const daysInMonth = new Date(2026, monthIdx + 1, 0).getDate();

            for(let i=0; i<firstDay; i++) {
                container.innerHTML += '<div class="day-cell bg-slate-50"></div>';
            }

            for(let d=1; d<=daysInMonth; d++) {
                const dateStr = `2026-0${monthIdx + 1}-${String(d).padStart(2, '0')}`;
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                cell.innerHTML = `<span class="day-number">${d}</span>`;
                
                const dayEvts = activities.filter(a => a.date === dateStr);
                dayEvts.forEach(evt => {
                    const label = document.createElement('div');
                    label.className = `event-label bg-${evt.type}`;
                    label.innerText = evt.title;
                    label.onclick = (e) => { e.stopPropagation(); openModal(evt); };
                    cell.appendChild(label);
                });
                container.appendChild(cell);
            }
        }

        function openModal(evt) {
            document.getElementById('modalTitle').innerText = evt.title;
            document.getElementById('modalDate').innerText = evt.date;
            document.getElementById('modalTime').innerText = evt.time;
            document.getElementById('modalLoc').innerText = evt.loc;
            document.getElementById('modalTarget').innerText = evt.target;
            document.getElementById('modalDesc').innerText = evt.desc;
            
            const header = document.getElementById('modalHeaderColor');
            const catLabel = document.getElementById('modalCategoryLabel');
            const actionBtn = document.getElementById('modalLink');
            
            header.className = `h-8 w-full bg-${evt.type}`;
            const typeNames = { 'at-center': '客廳活動', 'outside': '外出活動', 'family': '親子活動', 'regular': '恆常活動' };
            catLabel.innerText = typeNames[evt.type];

            // 處理報名按鈕
            if(evt.reg === 'none') {
                actionBtn.innerText = "不用報名，即時參加";
                actionBtn.href = "javascript:void(0)";
                actionBtn.style.backgroundColor = "#94a3b8"; // 灰色
            } else if(evt.reg === 'whatsapp') {
                actionBtn.innerText = "請查看 WhatsApp 訊息";
                actionBtn.href = "javascript:void(0)";
                actionBtn.style.backgroundColor = "#25d366"; // WhatsApp 綠色
            } else {
                actionBtn.innerText = "按此報名";
                actionBtn.href = REG_LINK;
                actionBtn.style.backgroundColor = "#f19149"; // 橙色
            }

            document.getElementById('eventModal').classList.replace('hidden', 'flex');
        }

        function closeModal() { document.getElementById('eventModal').classList.replace('flex', 'hidden'); }
        function changeMonth(m) { renderCalendar(m); }
        window.onclick = (e) => { if(e.target == document.getElementById('eventModal')) closeModal(); };
        window.onload = () => renderCalendar(2);
    </script>
</body>
</html>
