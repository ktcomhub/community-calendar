<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>賽馬會「聚首壹塘」社區客廳活動月曆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #fcfcfc;
            color: #333;
        }
        /* 賽馬會「聚首壹塘」配色 */
        .color-primary { color: #2d4a53; } /* 深青色 */
        .bg-primary { background-color: #2d4a53; }
        .bg-accent-orange { background-color: #f19149; }
        .bg-accent-yellow { background-color: #f9d548; }
        .bg-accent-pink { background-color: #e98b8b; }
        .bg-accent-teal { background-color: #79c3ba; }

        .calendar-grid { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            gap: 1px;
            background-color: #e2e8f0;
            border: 1px solid #e2e8f0;
        }
        .day-cell { 
            min-height: 120px; 
            background: white; 
            padding: 8px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            transition: background 0.2s;
        }
        .day-cell:hover { background: #f0f7f9; }
        .day-cell.today { background: #fffbeb; border: 2px solid #f9d548; }
        
        /* 針對手機顯示，增加格子高度方便長者點擊 */
        @media (max-width: 640px) {
            .day-cell { min-height: 90px; padding: 4px; }
            .event-label { font-size: 10px; line-height: 1.2; }
        }

        .event-label {
            margin-top: 4px;
            padding: 4px 6px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 12px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body class="pb-20">

    <!-- Header 頂部欄 -->
    <div class="bg-primary text-white p-6 shadow-lg mb-4 text-center">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-2xl md:text-3xl font-bold tracking-tight">賽馬會「聚首壹塘」社區客廳</h1>
            <div class="mt-2 inline-block px-4 py-1 bg-white/20 rounded-full text-sm">3月及4月活動總表</div>
        </div>
    </div>

    <!-- 月份切換 -->
    <div class="max-w-4xl mx-auto px-4 mb-6 flex justify-between items-center">
        <button onclick="changeMonth(2)" id="btnMar" class="flex-1 py-3 text-lg font-bold rounded-l-2xl border-2 border-primary transition-all">3月</button>
        <button onclick="changeMonth(3)" id="btnApr" class="flex-1 py-3 text-lg font-bold rounded-r-2xl border-2 border-l-0 border-primary transition-all">4月</button>
    </div>

    <!-- 星期顯示 -->
    <div class="max-w-4xl mx-auto px-2">
        <div class="calendar-grid rounded-t-2xl overflow-hidden mb-1">
            <div class="bg-slate-100 py-3 text-center text-red-500 font-bold">日</div>
            <div class="bg-slate-100 py-3 text-center font-bold">一</div>
            <div class="bg-slate-100 py-3 text-center font-bold">二</div>
            <div class="bg-slate-100 py-3 text-center font-bold">三</div>
            <div class="bg-slate-100 py-3 text-center font-bold">四</div>
            <div class="bg-slate-100 py-3 text-center font-bold">五</div>
            <div class="bg-slate-100 py-3 text-center text-blue-500 font-bold">六</div>
        </div>

        <!-- 月曆格內容 -->
        <div id="calendarDays" class="calendar-grid rounded-b-2xl overflow-hidden shadow-xl border-t-0">
            <!-- 由 JS 生成 -->
        </div>
    </div>

    <!-- 底部說明 -->
    <div class="max-w-4xl mx-auto mt-8 px-6 text-slate-500 text-sm italic text-center">
        * 點擊任何有活動的日期，即可查看詳情及報名 *
    </div>

    <!-- 活動詳情視窗 (針對手機優化) -->
    <div id="eventModal" class="fixed inset-0 bg-black/70 hidden items-end md:items-center justify-center z-50 p-0 md:p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-t-3xl md:rounded-3xl overflow-hidden animate-slide-up shadow-2xl">
            <!-- 頂部顏色條 -->
            <div id="modalHeaderColor" class="h-4 w-full"></div>
            
            <div class="p-8">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <span id="modalCategory" class="text-xs font-bold uppercase tracking-widest px-2 py-1 rounded bg-slate-100 text-slate-500">活動類別</span>
                        <h2 id="modalTitle" class="text-2xl font-bold mt-2 color-primary">活動名稱</h2>
                    </div>
                    <button onclick="closeModal()" class="bg-slate-100 w-10 h-10 rounded-full flex items-center justify-center text-2xl text-slate-400 hover:text-slate-600">&times;</button>
                </div>

                <div class="space-y-6 text-lg">
                    <div class="flex items-center gap-4">
                        <span class="w-10 h-10 flex items-center justify-center bg-orange-50 rounded-full text-xl">📅</span>
                        <div>
                            <p class="text-xs text-slate-400 font-bold">日期</p>
                            <p id="modalDate" class="font-bold text-slate-700"></p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="w-10 h-10 flex items-center justify-center bg-blue-50 rounded-full text-xl">⏰</span>
                        <div>
                            <p class="text-xs text-slate-400 font-bold">時間</p>
                            <p id="modalTime" class="font-bold text-slate-700"></p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="w-10 h-10 flex items-center justify-center bg-teal-50 rounded-full text-xl">📍</span>
                        <div>
                            <p class="text-xs text-slate-400 font-bold">地點</p>
                            <p id="modalLoc" class="font-bold text-slate-700"></p>
                        </div>
                    </div>
                    <div class="flex items-start gap-4">
                        <span class="w-10 h-10 flex items-center justify-center bg-purple-50 rounded-full text-xl">👥</span>
                        <div>
                            <p class="text-xs text-slate-400 font-bold">對象</p>
                            <p id="modalTarget" class="font-bold text-slate-700"></p>
                        </div>
                    </div>
                    <div id="descArea" class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                        <p id="modalDesc" class="text-slate-600 leading-relaxed"></p>
                    </div>
                </div>

                <!-- 特大報名按鈕 -->
                <div class="mt-10 mb-2">
                    <a id="modalLink" href="#" target="_blank" class="block w-full py-5 bg-accent-orange hover:bg-orange-600 text-white text-center text-xl font-bold rounded-2xl shadow-lg transition-transform active:scale-95">
                        👉 我要報名 / 查詢 👈
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 統一報名連結
        const GLOBAL_LINK = "https://forms.google.com/3XQCVsQdPNvvZDW79";

        // 從海報圖片中提取的活動資料
        const activities = [
            // 圖一活動
            { date: '2026-03-25', title: '中大學生同你傾 - 選科', time: '4:00 - 6:30 PM', loc: '客廳', target: '高小-初中生(初中優先)', desc: '想了解大學選科心得？中大學生親身分享經驗！', cat: '中大學生同你玩', color: 'bg-accent-teal' },
            { date: '2026-03-27', title: '一齊煲湯・整麻糬', time: '3:15 - 5:30 PM', loc: '客廳', target: '所有街坊', desc: '街坊大聚會，一齊分享滋味湯水同好味麻糬！', cat: '中大學生同你玩', color: 'bg-accent-pink' },
            { date: '2026-03-28', title: '學生帶你中大一日遊', time: '10:15 AM - 3:45 PM', loc: '中大*', target: '高小-初中生及其家庭', desc: '衝出觀塘！由大學生帶領參觀中大校園環境。', cat: '中大學生同你玩', color: 'bg-accent-yellow' },
            { date: '2026-04-01', title: '一齊去貓Cafe！', time: '3:00 - 5:30 PM', loc: '觀塘*', target: '所有街坊', desc: '放鬆心情，同貓貓一齊玩轉下午。', cat: '中大學生同你玩', color: 'bg-accent-orange' },
            { date: '2026-04-01', title: '中大學生同你傾 - 學習支援', time: '4:00 - 7:00 PM', loc: '客廳', target: '高小-高中生及其家庭', desc: '功課、學業遇到樽頸？哥哥姐姐幫緊你！', cat: '中大學生同你玩', color: 'bg-accent-teal' },
            { date: '2026-04-01', title: '觀塘行沈雲山', time: '3:15 - 5:15 PM', loc: '沈雲山*', target: '所有街坊', desc: '大家一齊郁下，欣賞觀塘景色。', cat: '中大學生同你玩', color: 'bg-accent-teal' },
            
            // 圖二活動
            { date: '2026-04-08', title: '行山食糖水', time: '2:30 - 6:30 PM', loc: '顯徑*', target: '所有街坊', desc: '遠足運動後一齊食番碗甜滋滋嘅糖水。', cat: '中大學生同你玩', color: 'bg-accent-teal' },
            { date: '2026-04-11', title: 'M+野餐', time: '3:30 - 7:00 PM', loc: 'M+(西九)', target: '所有街坊', desc: '草地野餐大派對！每人準備一份食物分享。', cat: '中大學生同你玩', color: 'bg-accent-pink' },
            
            // 親子節數活動 (跨日)
            { date: '2026-04-08', title: '親子/祖孫一齊玩(1)', time: '5:00 - 7:00 PM', loc: '客廳', target: '親子/祖孫', desc: '建立良好親子關係。*需出席所有節數', cat: '中大學生同你玩', color: 'bg-accent-yellow' },
            { date: '2026-04-09', title: '親子/祖孫一齊玩(2)', time: '5:00 - 7:00 PM', loc: '客廳', target: '親子/祖孫', desc: '建立良好親子關係。*需出席所有節數', cat: '中大學生同你玩', color: 'bg-accent-yellow' },
            { date: '2026-04-10', title: '親子/祖孫一齊玩(3)', time: '5:00 - 7:00 PM', loc: '客廳', target: '親子/祖孫', desc: '建立良好親子關係。*需出席所有節數', cat: '中大學生同你玩', color: 'bg-accent-yellow' }
        ];

        let currentMonth = 2; // 預設顯示 3 月

        function renderCalendar(monthIdx) {
            currentMonth = monthIdx;
            const year = 2026;
            const container = document.getElementById('calendarDays');
            container.innerHTML = '';

            // 更新按鈕樣式
            const btnMar = document.getElementById('btnMar');
            const btnApr = document.getElementById('btnApr');
            if(monthIdx === 2) {
                btnMar.className = "flex-1 py-3 text-lg font-bold rounded-l-2xl border-2 border-primary bg-primary text-white shadow-inner";
                btnApr.className = "flex-1 py-3 text-lg font-bold rounded-r-2xl border-2 border-l-0 border-primary text-primary bg-white";
            } else {
                btnMar.className = "flex-1 py-3 text-lg font-bold rounded-l-2xl border-2 border-primary text-primary bg-white";
                btnApr.className = "flex-1 py-3 text-lg font-bold rounded-r-2xl border-2 border-l-0 border-primary bg-primary text-white shadow-inner";
            }

            const firstDay = new Date(year, monthIdx, 1).getDay();
            const daysInMonth = new Date(year, monthIdx + 1, 0).getDate();

            for(let i=0; i<firstDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'day-cell bg-slate-50/50';
                container.appendChild(empty);
            }

            for(let d=1; d<=daysInMonth; d++) {
                const dateStr = `${year}-${String(monthIdx + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                cell.innerHTML = `<span class="text-sm font-bold text-slate-400">${d}</span>`;
                
                const dayEvts = activities.filter(a => a.date === dateStr);
                if(dayEvts.length > 0) {
                    dayEvts.forEach(evt => {
                        const label = document.createElement('div');
                        label.className = `event-label ${evt.color} text-slate-800`;
                        label.innerText = evt.title;
                        cell.appendChild(label);
                    });
                    // 整格日期可點擊
                    cell.onclick = () => openModal(dayEvts[0]);
                } else {
                    cell.classList.add('cursor-default');
                }
                
                container.appendChild(cell);
            }
        }

        function changeMonth(m) { renderCalendar(m); }

        function openModal(evt) {
            document.getElementById('modalTitle').innerText = evt.title;
            document.getElementById('modalDate').innerText = evt.date;
            document.getElementById('modalTime').innerText = evt.time;
            document.getElementById('modalLoc').innerText = evt.loc;
            document.getElementById('modalTarget').innerText = evt.target;
            document.getElementById('modalDesc').innerText = evt.desc;
            document.getElementById('modalCategory').innerText = evt.cat;
            document.getElementById('modalLink').href = GLOBAL_LINK;
            
            // 頂部顏色條隨活動分類變化
            document.getElementById('modalHeaderColor').className = `h-4 w-full ${evt.color}`;

            document.getElementById('eventModal').classList.replace('hidden', 'flex');
        }

        function closeModal() {
            document.getElementById('eventModal').classList.replace('flex', 'hidden');
        }

        // 點擊外面關閉
        window.onclick = function(e) {
            if(e.target == document.getElementById('eventModal')) closeModal();
        }

        window.onload = () => renderCalendar(2);
    </script>
</body>
</html>
